name: Deploy NestJS to EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  APP_DIR: /var/www/app/backend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: "npm"

      - name: Install deps
        run: npm install

      - name: Build NestJS
        run: npm run build   # creates dist/

      - name: Package build
        run: |
          mkdir -p deploy

          cp -r dist deploy/
          cp package*.json deploy/
          cp ecosystem.config.js deploy/

          tar -czf deploy.tar.gz -C deploy .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: deploy.tar.gz
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build

      # 🔥 PRE-CLEAN + BACKUP
      - name: Pre-clean EC2
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
          KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$KEY" > key.pem
          chmod 600 key.pem

          ssh -i key.pem -o StrictHostKeyChecking=no $USER@$HOST << EOF
            cd $APP_DIR || exit

            mkdir -p backups
            ts=$(date +%Y%m%d_%H%M%S)

            tar -czf backups/backup_$ts.tar.gz dist 2>/dev/null || true
            ls -t backups/*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm

            rm -rf dist
            rm -f deploy.tar.gz

            npm cache clean --force || true
          EOF

          rm key.pem

      # 🚀 DEPLOY
      - name: Deploy to EC2
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
          KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$KEY" > key.pem
          chmod 600 key.pem

          scp -i key.pem -o StrictHostKeyChecking=no \
            deploy.tar.gz $USER@$HOST:$APP_DIR/

          ssh -i key.pem -o StrictHostKeyChecking=no $USER@$HOST << EOF
            cd $APP_DIR || exit

            ls -lh deploy.tar.gz || exit 1
            tar -tzf deploy.tar.gz | head || exit 1

            rm -rf dist

            tar -xzf deploy.tar.gz || exit 1
            rm deploy.tar.gz

            ls -la dist || exit 1

            npm install --production || exit 1

            sudo chown -R $USER:$USER $APP_DIR

            echo "🔁 Restarting PM2..."
            pm2 delete nest-app || true
            pm2 start ecosystem.config.js --name nest-app
            pm2 save

            echo "🔁 Restarting Nginx..."
            sudo systemctl restart nginx || true

            echo "✅ Deployment completed"
          EOF

          rm key.pem

      # 🔍 VERIFY
      - name: Verify deployment
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 10

          for i in {1..3}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://$HOST/api || echo "000")

            echo "Attempt $i → Status: $status"

            if [ "$status" = "200" ] || [ "$status" = "301" ] || [ "$status" = "302" ]; then
              echo "✅ API is live!"
              exit 0
            fi

            sleep 5
          done

          echo "❌ Deployment failed"
          exit 1