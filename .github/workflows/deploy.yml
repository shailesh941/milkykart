name: Deploy Next.js to GCP VM

on:
  push:
    branches: [main, master]

env:
  APP_DIR: /var/www/app/backend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Show BUILD_ID
        run: cat .next/BUILD_ID

      - name: Package build
        run: |
          mkdir -p deploy
          cp -r .next deploy/
          cp -r public deploy/
          cp package*.json deploy/
          cp ecosystem.config.js deploy/
          cp next.config.* deploy/ 2>/dev/null || true
          tar -czf deploy.tar.gz -C deploy .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: deploy.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build

      # 🔐 Authenticate with GCP (OIDC - no SSH key)
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # 🔥 PRE-CLEAN + BACKUP
      - name: Pre-clean VM
        run: |
          gcloud compute ssh ${{ secrets.GCP_INSTANCE }} \
            --zone=${{ secrets.GCP_ZONE }} \
            --command="
              cd $APP_DIR || exit

              echo '🔹 Creating backup...'
              mkdir -p backups
              ts=\$(date +%Y%m%d_%H%M%S)

              tar -czf backups/backup_\$ts.tar.gz .next 2>/dev/null || true

              # Keep last 5 backups
              ls -t backups/*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm

              echo '🔹 Cleaning old build...'
              rm -rf .next
              rm -f deploy.tar.gz

              npm cache clean --force || true
            "

      # 📤 Upload build
      - name: Upload build
        run: |
          gcloud compute scp deploy.tar.gz \
            ${{ secrets.GCP_INSTANCE }}:$APP_DIR/ \
            --zone=${{ secrets.GCP_ZONE }} \
            --quiet

      # 🚀 DEPLOY
      - name: Deploy
        run: |
          gcloud compute ssh ${{ secrets.GCP_INSTANCE }} \
            --zone=${{ secrets.GCP_ZONE }} \
            --command="
              set -e
              cd $APP_DIR || exit

              echo '📦 Checking uploaded file...'
              ls -lh deploy.tar.gz || exit 1

              echo '📦 Validating archive...'
              tar -tzf deploy.tar.gz | head || exit 1

              echo '🔥 Removing old build...'
              rm -rf .next

              echo '📦 Extracting new build...'
              tar -xzf deploy.tar.gz
              rm deploy.tar.gz

              echo '🔍 Verifying build...'
              ls -la .next || exit 1
              cat .next/BUILD_ID || exit 1

              echo '📦 Installing dependencies...'
              npm install

              echo '🔁 Restarting PM2...'
              pm2 reload next-app || pm2 start ecosystem.config.js --name next-app
              pm2 save

              echo '🔁 Restarting Nginx...'
              sudo systemctl restart nginx || true

              echo '✅ Deployment completed successfully'
            "

      # 🔍 VERIFY
      - name: Verify deployment
        run: |
          echo "⏳ Waiting for app..."
          sleep 10

          for i in {1..3}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.APP_URL }} || echo "000")

            echo "Attempt $i → Status: $status"

            if [[ "$status" == "200" || "$status" == "301" || "$status" == "302" ]]; then
              echo "✅ App is live!"
              exit 0
            fi

            sleep 5
          done

          echo "❌ Deployment failed"
          exit 1